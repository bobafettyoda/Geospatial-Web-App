services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-habitat}
      POSTGRES_USER: ${POSTGRES_USER:-habitat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-habitat}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/sql:/docker-entrypoint-initdb.d:ro

  martin:
    image: ghcr.io/maplibre/martin:latest
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://habitat:habitat@db:5432/habitat}
    ports:
      - "3000:3000"
    command: ["--listen-addresses", "0.0.0.0:3000", "${DATABASE_URL:-postgresql://habitat:habitat@db:5432/habitat}"]

  api:
    build: ./backend
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://habitat:habitat@db:5432/habitat}
    ports:
      - "8000:8000"

volumes:
  pgdata:
